services:
  postgres:
    image: postgres:16-alpine
    container_name: adamhub-postgres
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  adamhub-api:
    build: .
    container_name: adamhub-api
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - ADAMHUB_DB_URL=postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    ports:
      - "8000:8000"
    restart: unless-stopped

  openclaw:
    image: your-openclaw-image:latest
    container_name: openclaw
    depends_on:
      - adamhub-api
    environment:
      - ADAMHUB_API_URL=http://adamhub-api:8000
      - ADAMHUB_API_KEY=${ADAMHUB_API_KEY}
    restart: unless-stopped

volumes:
  postgres_data:
