<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AdamHUB</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/static/styles.css?v=20260305-2" />
  </head>
  <body>
    <div class="bg-layer"></div>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <h1>AdamHUB</h1>
          <p>Life control panel</p>
        </div>

        <div class="config">
          <label>
            API URL
            <input id="apiUrl" type="text" placeholder="http://localhost:8000" />
          </label>
          <label>
            API Key
            <input id="apiKey" type="password" placeholder="X-API-Key" />
          </label>
          <button id="saveConfigBtn" class="btn btn-primary">Sauver</button>
          <button id="testConfigBtn" class="btn">Tester connexion</button>
        </div>

        <nav id="nav" class="nav"></nav>
      </aside>

      <main class="main">
        <header class="topbar">
          <div>
            <h2 id="pageTitle">Dashboard</h2>
            <p id="pageSubtitle">Vue d'ensemble de ta vie</p>
          </div>
          <button id="refreshAllBtn" class="btn">Rafraîchir</button>
        </header>

        <section id="section-dashboard" class="section active"></section>
        <section id="section-tasks" class="section"></section>
        <section id="section-finances" class="section"></section>
        <section id="section-groceries" class="section"></section>
        <section id="section-recipes" class="section"></section>
        <section id="section-meal-plans" class="section"></section>
        <section id="section-habits" class="section"></section>
        <section id="section-goals" class="section"></section>
        <section id="section-events" class="section"></section>
        <section id="section-calendar" class="section"></section>
        <section id="section-subscriptions" class="section"></section>
        <section id="section-pantry" class="section"></section>
        <section id="section-notes" class="section"></section>
        <section id="section-linear" class="section"></section>
        <section id="section-ai" class="section"></section>
      </main>
    </div>

    <template id="cardTemplate">
      <article class="card">
        <h3></h3>
        <div class="card-body"></div>
      </article>
    </template>

    <script src="/static/app.js?v=20260306-2" defer></script>
  </body>
</html>
